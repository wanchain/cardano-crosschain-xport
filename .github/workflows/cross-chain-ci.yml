name: Cross-Chain CI

on:
  push:
    branches: ["main"]
    paths:
      - "cross-chain/**"
      - ".github/workflows/cross-chain-ci.yml"
  pull_request:
    paths:
      - "cross-chain/**"
      - ".github/workflows/cross-chain-ci.yml"

jobs:
  aiken:
    name: Aiken Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cross-chain
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: aiken-lang/setup-aiken@c8a4cc81f420d1cf03776bc5367675f9a08582e6 # v1.0.3
        with:
          version: v1.1.21

      - name: Check formatting
        run: aiken fmt --check

      - name: Run tests
        run: aiken check

      - name: Build validators
        run: aiken build
